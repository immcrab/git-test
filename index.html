<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wwebsite // W-Messages</title>
    <style>
        /* --- HIGH-END SYSTEM DESIGN TOKENS --- */
        :root {
            --bg-canvas: #030305;
            --bg-panel: #0c0c12;
            --border-primary: #1a1a26;
            --border-accent: rgba(212, 175, 55, 0.3);
            
            --text-main: #ffffff;
            --text-muted: #6e6e7d;
            
            /* Status Glows */
            --glow-gold: #d4af37;
            --glow-purple: #7e22ce;
            --glow-green: #10b981;
            --glow-red: #ef4444;
            
            /* Chat Gradients */
            --gradient-self: linear-gradient(135deg, #4a2b72 0%, #1e1b4b 100%);
            --gradient-peer: rgba(255, 255, 255, 0.03);
            --glass-backdrop: rgba(12, 12, 18, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }

        body { background-color: var(--bg-canvas); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }

        /* --- AUTHENTICATION LOCK INTERCEPTOR --- */
        #auth-lock-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-canvas); z-index: 99999; display: flex;
            justify-content: center; align-items: center; text-align: center;
        }
        .auth-card { background: var(--bg-panel); border: 1px solid var(--border-primary); padding: 40px; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .auth-card h2 { font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }

        /* --- DOUBLE-PANE UI GRID --- */
        .platform-grid { display: grid; grid-template-columns: 350px 1fr; width: 100vw; height: 100vh; }

        /* LEFT PANE: CONTACTS */
        .sidebar-pane { background: var(--bg-panel); border-right: 1px solid var(--border-primary); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border-primary); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h1 { font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase; font-weight: 600; }
        .btn-add-chat { background: transparent; color: var(--glow-gold); border: 1px solid var(--border-accent); padding: 8px 12px; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; transition: all 0.2s; }
        .btn-add-chat:hover { background: rgba(212, 175, 55, 0.1); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        
        .chat-list-scroller { flex: 1; overflow-y: auto; }
        .chat-row { display: flex; align-items: center; gap: 15px; padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.02); cursor: pointer; transition: background 0.2s; }
        .chat-row:hover, .chat-row.active { background: rgba(255,255,255,0.03); }
        .avatar-circle { width: 45px; height: 45px; border-radius: 50%; background: #1a1a26; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .status-indicator { position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--bg-panel); }
        .status-online { background: var(--glow-green); }
        .status-busy { background: var(--glow-gold); }
        .status-offline { background: var(--text-muted); }
        .chat-meta h3 { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
        .chat-meta p { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* RIGHT PANE: MAIN VIEWPORT */
        .viewport-pane { display: flex; flex-direction: column; background: var(--bg-canvas); position: relative; }
        .viewport-header { padding: 20px 30px; background: var(--bg-panel); border-bottom: 1px solid var(--border-primary); display: flex; justify-content: space-between; align-items: center; }
        .header-title { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: 0.5px; }
        .member-count { font-size: 0.75rem; color: var(--text-muted); background: #1a1a26; padding: 4px 10px; border-radius: 12px; }
        
        /* PLAYFUL CHAT BUBBLES */
        .message-stream { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 24px; }
        .msg-wrapper { display: flex; flex-direction: column; max-width: 60%; position: relative; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg-wrapper.self { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.peer { align-self: flex-start; align-items: flex-start; }
        
        .msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 6px; padding: 0 4px; display: flex; gap: 8px; }
        .interaction-row { display: flex; align-items: center; gap: 10px; width: 100%; position: relative; }
        .self .interaction-row { flex-direction: row-reverse; }
        
        .bubble { padding: 14px 22px; border-radius: 24px; font-size: 0.95rem; line-height: 1.5; color: #fff; word-break: break-word; backdrop-filter: blur(8px); }
        .self .bubble { background: var(--gradient-self); border-bottom-right-radius: 6px; box-shadow: 0 4px 15px rgba(126, 34, 206, 0.2); }
        .peer .bubble { background: var(--gradient-peer); border-bottom-left-radius: 6px; border: 1px solid var(--border-primary); }
        
        .btn-retract { opacity: 0; background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; transition: opacity 0.2s, color 0.2s; }
        .msg-wrapper:hover .btn-retract { opacity: 1; }
        .btn-retract:hover { color: var(--glow-red); text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* Media / Game Embeds */
        .media-embed { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border-primary); }
        .game-demo-card { background: #000; border: 1px solid var(--glow-purple); padding: 20px; border-radius: 12px; text-align: center; margin-top: 10px; }

        /* CHAT DOCK CONTROLS */
        .dock-container { padding: 30px; background: transparent; }
        .pill-dock { background: var(--bg-panel); border: 1px solid var(--border-primary); border-radius: 40px; display: flex; align-items: center; padding: 10px 20px; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-area { flex: 1; background: transparent; border: none; color: #fff; font-size: 0.95rem; outline: none; padding: 10px; }
        .input-area::placeholder { color: var(--text-muted); }
        
        .dock-btn { background: #1a1a26; border: none; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s; }
        .dock-btn:hover { background: var(--glow-purple); box-shadow: 0 0 15px var(--glow-purple); }
        .dock-btn.send-btn { background: var(--text-main); color: #000; }
        .dock-btn.send-btn:hover { background: var(--glow-gold); box-shadow: 0 0 15px var(--glow-gold); }

        /* --- MODALS --- */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 5000; justify-content: center; align-items: center; }
        .modal-box { background: var(--bg-panel); border: 1px solid var(--border-primary); padding: 40px; border-radius: 8px; width: 400px; position: relative; }
        .modal-box input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border-primary); color: #fff; outline: none; border-radius: 4px; margin-bottom: 20px; }
        .btn-action { width: 100%; padding: 15px; background: var(--text-main); color: #000; border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
        .btn-action:hover { background: var(--glow-gold); }
        .close-modal { position: absolute; top: 15px; right: 20px; background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-lock-overlay">
        <div class="auth-card">
            <h2>Access Restricted</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Sign-in required to open secure communication terminal.</p>
            <button class="btn-action" style="margin-top: 20px;" onclick="window.location.href='/'">Return to Homepage</button>
        </div>
    </div>

    <div class="platform-grid" id="main-interface" style="display: none;">
        
        <aside class="sidebar-pane">
            <div class="sidebar-header">
                <h1>W-Messages</h1>
                <button class="btn-add-chat" onclick="toggleModal('createChatModal', true)">➕ Create</button>
            </div>
            <div class="chat-list-scroller" id="contactScrollerNode">
                </div>
        </aside>

        <main class="viewport-pane">
            
            <div id="empty-state" style="display:flex; height:100%; align-items:center; justify-content:center; color:var(--text-muted); flex-direction:column; gap:10px;">
                <span style="font-size: 2rem;">🛡️</span>
                <p style="letter-spacing: 2px; text-transform: uppercase; font-size: 0.85rem;">Select a secure pipeline to engage</p>
            </div>

            <div id="active-chat-interface" style="display: none; flex-direction: column; height: 100%;">
                <div class="viewport-header">
                    <div class="header-title" id="activeChatTitle">Team Pipeline <span class="member-count" id="activeChatCount">2</span></div>
                    <button class="dock-btn" style="border-radius: 4px; width: auto; padding: 0 15px; font-size: 0.8rem;" onclick="toggleModal('permissionsModal', true)">🔒 Permissions</button>
                </div>
                
                <div class="message-stream" id="messageStreamContainer">
                    </div>

                <div class="dock-container">
                    <div class="pill-dock">
                        <button class="dock-btn" onclick="document.getElementById('fileUploadNode').click()" title="Upload Assets">📁</button>
                        <input type="file" id="fileUploadNode" style="display: none;" onchange="executeAssetUpload(event)">
                        
                        <button class="dock-btn" onclick="triggerGameDemoPayload()" title="Launch Game Demo">🚀</button>
                        
                        <input type="text" id="chatInputNode" class="input-area" placeholder="Type your message to the crew..." onkeypress="handleEnterKey(event)">
                        
                        <button class="dock-btn send-btn" onclick="transmitPayload()">➔</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="createChatModal">
        <div class="modal-box">
            <button class="close-modal" onclick="toggleModal('createChatModal', false)">&times;</button>
            <h3 style="margin-bottom: 20px; text-transform: uppercase; font-size: 1rem; color: var(--glow-gold);">Initialize Channel</h3>
            <input type="text" id="targetUserInput" placeholder="Enter Teammate Email or Username">
            <button class="btn-action" onclick="initializeSecureThread()">Establish Link</button>
        </div>
    </div>

    <div class="modal-overlay" id="permissionsModal">
        <div class="modal-box">
            <button class="close-modal" onclick="toggleModal('permissionsModal', false)">&times;</button>
            <h3 style="margin-bottom: 20px; text-transform: uppercase; font-size: 1rem;">Security Permissions</h3>
            <div id="permissionsList" style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">
                </div>
            <button class="btn-action" style="background: transparent; border: 1px solid var(--border-primary); color: #fff;" onclick="toggleModal('permissionsModal', false)">Close Terminal</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, set, remove, onValue, onChildAdded, onChildRemoved, get, update, off } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // DEVELOPER NOTE: Replace with Version 25 production keys
        const firebaseConfig = {
            apiKey: "AIzaSy_MOCK_KEY_FOR_W_WEBSITE",
            authDomain: "wwebsite-v25.firebaseapp.com",
            databaseURL: "https://wwebsite-v25-default-rtdb.firebaseio.com",
            projectId: "wwebsite-v25",
            storageBucket: "wwebsite-v25.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const rtdb = getDatabase(app);
        const storage = getStorage(app);

        let activeChatId = null;
        let currentUserData = null;

        // --- 1. SYSTEM SECURITY & INITIALIZATION ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-lock-overlay').style.display = 'none';
                document.getElementById('main-interface').style.display = 'grid';
                
                // Fetch current user meta
                get(ref(rtdb, `users/${user.uid}`)).then(snap => {
                    currentUserData = snap.val() || { displayName: user.email.split('@')[0], presenceStatus: 'online' };
                    // Set self to online
                    update(ref(rtdb, `users/${user.uid}`), { presenceStatus: 'online' });
                    attachSidebarListeners(user.uid);
                });
            } else {
                document.getElementById('auth-lock-overlay').style.display = 'flex';
                document.getElementById('main-interface').style.display = 'none';
            }
        });

        window.toggleModal = function(id, show) {
            document.getElementById(id).style.display = show ? 'flex' : 'none';
        }

        // --- 2. THREAD CREATION MATRIX ---
        window.initializeSecureThread = function() {
            const targetQuery = document.getElementById('targetUserInput').value.trim().toLowerCase();
            if(!targetQuery) return;

            get(ref(rtdb, 'users')).then(snapshot => {
                const users = snapshot.val() || {};
                let targetId = null;
                let targetData = null;

                for(let uid in users) {
                    if((users[uid].email && users[uid].email.toLowerCase() === targetQuery) || 
                       (users[uid].displayName && users[uid].displayName.toLowerCase() === targetQuery)) {
                        targetId = uid;
                        targetData = users[uid];
                        break;
                    }
                }

                if(!targetId) { alert("Node unreachable: Teammate not found."); return; }
                if(targetId === auth.currentUser.uid) { alert("Loopback block: Cannot connect to self."); return; }

                const unifiedChatId = [auth.currentUser.uid, targetId].sort().join("_");
                
                // Establish bidirectional link
                set(ref(rtdb, `users/${auth.currentUser.uid}/activeChats/${unifiedChatId}`), { targetId: targetId, targetName: targetData.displayName, type: 'direct' });
                set(ref(rtdb, `users/${targetId}/activeChats/${unifiedChatId}`), { targetId: auth.currentUser.uid, targetName: currentUserData.displayName, type: 'direct' });
                
                toggleModal('createChatModal', false);
                document.getElementById('targetUserInput').value = '';
            });
        }

        function attachSidebarListeners(uid) {
            onValue(ref(rtdb, `users/${uid}/activeChats`), (snapshot) => {
                const scroller = document.getElementById('contactScrollerNode');
                scroller.innerHTML = '';
                const chats = snapshot.val();
                
                if(!chats) return;

                Object.keys(chats).forEach(chatId => {
                    const meta = chats[chatId];
                    // Real-time presence fetch
                    get(ref(rtdb, `users/${meta.targetId}/presenceStatus`)).then(statusSnap => {
                        const status = statusSnap.val() || 'offline';
                        const statusColorClass = status === 'online' ? 'status-online' : (status === 'busy' ? 'status-busy' : 'status-offline');
                        const initials = meta.targetName.substring(0,2).toUpperCase();
                        const isActive = chatId === activeChatId ? 'active' : '';

                        const rowHTML = `
                            <div class="chat-row ${isActive}" onclick="openChatPipeline('${chatId}', '${meta.targetName}', '${meta.targetId}')">
                                <div class="avatar-circle">
                                    ${initials}
                                    <div class="status-indicator ${statusColorClass}"></div>
                                </div>
                                <div class="chat-meta">
                                    <h3>${meta.targetName}</h3>
                                    <p>Encrypted stream active...</p>
                                </div>
                            </div>
                        `;
                        scroller.insertAdjacentHTML('beforeend', rowHTML);
                    });
                });
            });
        }

        // --- 3. ACTIVE CHAT VIEWPORT & PLAYFUL BUBBLES ---
        window.openChatPipeline = function(chatId, targetName, targetId) {
            if(activeChatId) {
                off(ref(rtdb, `chats/${activeChatId}/messages`), 'child_added');
                off(ref(rtdb, `chats/${activeChatId}/messages`), 'child_removed');
            }

            activeChatId = chatId;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('active-chat-interface').style.display = 'flex';
            document.getElementById('activeChatTitle').innerText = targetName;
            
            const stream = document.getElementById('messageStreamContainer');
            stream.innerHTML = '';

            const msgRef = ref(rtdb, `chats/${chatId}/messages`);
            
            onChildAdded(msgRef, (snapshot) => {
                renderBubble(snapshot.key, snapshot.val());
                triggerOfflineNotificationLogic(targetId, snapshot.val());
            });

            // REAL-TIME DELETION LISTENER
            onChildRemoved(msgRef, (snapshot) => {
                const domNode = document.getElementById(`msg-${snapshot.key}`);
                if(domNode) {
                    // Smooth exit animation
                    domNode.style.transition = 'all 0.3s ease';
                    domNode.style.opacity = '0';
                    domNode.style.transform = 'scale(0.9)';
                    setTimeout(() => domNode.remove(), 300);
                }
            });
        }

        function renderBubble(msgId, data) {
            const stream = document.getElementById('messageStreamContainer');
            const isSelf = data.senderId === auth.currentUser.uid;
            const layoutClass = isSelf ? 'self' : 'peer';
            const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            let contentBlock = `<div class="bubble">${data.text}</div>`;
            
            // Handle Media Types
            if(data.type === 'file') {
                contentBlock = `<div class="bubble"><img src="${data.fileUrl}" class="media-embed"><br/><span style="font-size:0.75rem; color:#ccc;">${data.text}</span></div>`;
            } else if (data.type === 'game_demo') {
                contentBlock = `
                    <div class="bubble game-demo-card">
                        <h4 style="margin-bottom: 10px; color: var(--glow-gold);">🎮 Interactive Demo Initiated</h4>
                        <button class="btn-action" style="padding: 8px 15px; font-size:0.8rem;" onclick="alert('Launching W-Suite Sandbox Engine...')">Playtest Now</button>
                    </div>`;
            }

            const retractBtn = isSelf ? `<button class="btn-retract" title="Retract Transmission" onclick="retractMessage('${msgId}')">🗑️</button>` : '';

            const html = `
                <div class="msg-wrapper ${layoutClass}" id="msg-${msgId}">
                    <div class="msg-meta"><span>${data.senderName}</span> • <span>${time}</span></div>
                    <div class="interaction-row">
                        ${contentBlock}
                        ${retractBtn}
                    </div>
                </div>
            `;
            stream.insertAdjacentHTML('beforeend', html);
            stream.scrollTop = stream.scrollHeight;
        }

        // --- 4. MESSAGE MANAGEMENT & RETRACTION ---
        window.transmitPayload = function() {
            if(!activeChatId) return;
            const input = document.getElementById('chatInputNode');
            const text = input.value.trim();
            if(!text) return;

            push(ref(rtdb, `chats/${activeChatId}/messages`), {
                senderId: auth.currentUser.uid,
                senderName: currentUserData.displayName,
                text: text,
                type: 'text',
                timestamp: Date.now()
            });
            input.value = '';
        }

        window.handleEnterKey = function(e) { if(e.key === 'Enter') transmitPayload(); }

        window.retractMessage = function(msgId) {
            if(!activeChatId) return;
            remove(ref(rtdb, `chats/${activeChatId}/messages/${msgId}`))
                .catch(err => console.error("Database hard-delete failed:", err));
        }

        // --- 5. CHAT DOCK: FILE PIPELINE & DEMO INJECTION ---
        window.executeAssetUpload = function(e) {
            const file = e.target.files[0];
            if(!file || !activeChatId) return;

            const storagePath = storageRef(storage, `chat_assets/${activeChatId}/${Date.now()}_${file.name}`);
            
            uploadBytes(storagePath, file).then((snapshot) => {
                getDownloadURL(snapshot.ref).then((url) => {
                    push(ref(rtdb, `chats/${activeChatId}/messages`), {
                        senderId: auth.currentUser.uid,
                        senderName: currentUserData.displayName,
                        text: `Asset Deployed: ${file.name}`,
                        type: 'file',
                        fileUrl: url,
                        timestamp: Date.now()
                    });
                });
            });
        }

        window.triggerGameDemoPayload = function() {
            if(!activeChatId) return;
            push(ref(rtdb, `chats/${activeChatId}/messages`), {
                senderId: auth.currentUser.uid,
                senderName: currentUserData.displayName,
                text: "Game Demo Link",
                type: 'game_demo',
                timestamp: Date.now()
            });
        }

        // --- 6. AUTOMATED SYSTEM ALERTS (EMAILJS / RESEND LOGIC) ---
        function triggerOfflineNotificationLogic(targetId, msgData) {
            // Prevent alerting self
            if (msgData.senderId === targetId) return;

            get(ref(rtdb, `users/${targetId}`)).then(snap => {
                const targetUser = snap.val();
                if(!targetUser) return;

                // If user is offline or busy, dispatch alert payload
                if(targetUser.presenceStatus === 'offline' || targetUser.presenceStatus === 'busy') {
                    
                    const emailPayload = {
                        to_email: targetUser.email,
                        subject: `[W-Suite Terminal] Unread Transmission From ${msgData.senderName}`,
                        message: `Hello ${targetUser.displayName}, you have unread platform updates waiting in your W-Messages secure terminal pipeline.\n\n` +
                                 `Snippet: "${msgData.text}"\n\n` +
                                 `--------------------------------------------------\n` +
                                 `🤖 This is an automated notification generated by the W-Suite Network Operations Command center. Please do not reply directly to this mailbox node.`
                    };

                    /* * DEV NOTE: Frontend Fetch Call representation. 
                     * In production, proxy this through a Firebase Cloud Function.
                     */
                    console.log("System Notice: Dispatching offline email payload to mail server...", emailPayload);
                    
                    // fetch('https://api.resend.com/emails', {
                    //     method: 'POST',
                    //     headers: { 'Authorization': 'Bearer YOUR_API_KEY', 'Content-Type': 'application/json' },
                    //     body: JSON.stringify({ ... })
                    // });
                }
            });
        }
    </script>
</body>
</html>
